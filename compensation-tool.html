<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Compensation Guide</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11; --surface: #16181c; --surface2: #1e2026;
    --border: #2a2d35; --border-light: #363a45;
    --text: #e8eaf0; --text-muted: #7a7f8e; --text-dim: #4a4f5e;
    --accent: #4f8ef7; --accent-glow: rgba(79,142,247,0.15);
    --green: #3ecf8e; --yellow: #f5a623; --orange: #f07048; --red: #e85555;
    --font-mono: 'IBM Plex Mono', monospace; --font-sans: 'IBM Plex Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .header-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header h1 { font-family: var(--font-mono); font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-left: auto; font-family: var(--font-mono); }

  .main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .step-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  .selector-section { margin-bottom: 28px; }
  .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; font-weight: 500; padding: 9px 16px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--border-light); color: var(--text); }
  .btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .btn.sev-low.active    { background: rgba(62,207,142,0.1); border-color: var(--green); color: var(--green); }
  .btn.sev-medium.active { background: rgba(245,166,35,0.1); border-color: var(--yellow); color: var(--yellow); }
  .btn.sev-high.active   { background: rgba(240,112,72,0.1); border-color: var(--orange); color: var(--orange); }
  .btn.sev-critical.active { background: rgba(232,85,85,0.1); border-color: var(--red); color: var(--red); }

  /* Order section */
  .order-section { display: none; flex-wrap: wrap; align-items: flex-start; gap: 28px; margin-bottom: 28px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .order-section.show { display: flex; }
  .order-col { display: flex; flex-direction: column; gap: 8px; }
  .order-col-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
  .toggle-group { display: flex; gap: 6px; }

  .order-input-wrap { position: relative; display: inline-flex; align-items: center; }
  .order-input-wrap .prefix { position: absolute; left: 12px; font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); pointer-events: none; }
  .order-input { background: var(--surface2); border: 1px solid var(--border-light); color: var(--text); font-family: var(--font-mono); font-size: 13px; font-weight: 500; padding: 8px 12px 8px 26px; border-radius: 6px; width: 150px; outline: none; transition: border-color 0.15s; }
  .order-input:focus { border-color: var(--accent); }
  .order-input::placeholder { color: var(--text-dim); }
  .order-hint { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 4px; }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* Result */
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .result-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .badge { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 4px; letter-spacing: 0.08em; text-transform: uppercase; }
  .badge-low    { background: rgba(62,207,142,0.12); color: var(--green); }
  .badge-medium { background: rgba(245,166,35,0.12); color: var(--yellow); }
  .badge-high   { background: rgba(240,112,72,0.12); color: var(--orange); }
  .badge-critical { background: rgba(232,85,85,0.12); color: var(--red); }
  .result-title { font-size: 14px; font-weight: 500; }

  .result-body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .result-body { grid-template-columns: 1fr; } }
  .result-section h3 { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
  .result-section p { font-size: 13px; line-height: 1.7; color: var(--text); }

  /* Copy buttons */
  .copy-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border-light); color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); background: rgba(62,207,142,0.08); }

  /* Credits */
  .credit-big { font-family: var(--font-mono); font-size: 28px; font-weight: 600; color: var(--accent); display: block; margin-bottom: 4px; }
  .credit-big.calculated { color: var(--green); }
  .credit-label { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .credit-bonus { font-size: 12px; color: var(--yellow); font-family: var(--font-mono); margin-top: 6px; display: block; }
  .credit-hint { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 6px; display: block; }

  /* Escalation */
  .escalation-box { margin: 0 24px 24px; padding: 14px 16px; background: rgba(232,85,85,0.07); border: 1px solid rgba(232,85,85,0.22); border-radius: 8px; font-size: 13px; line-height: 1.6; }
  .esc-title { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--red); margin-bottom: 8px; text-transform: uppercase; }
  .esc-copy-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 6px 12px; background: rgba(232,85,85,0.06); border: 1px solid rgba(232,85,85,0.25); color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .esc-copy-btn:hover { color: var(--red); border-color: var(--red); }
  .esc-copy-btn.copied { color: var(--green); border-color: var(--green); background: rgba(62,207,142,0.08); }

  /* Reminder */
  .reminder-box { margin: 0 24px 24px; padding: 14px 16px; background: rgba(79,142,247,0.06); border: 1px solid rgba(79,142,247,0.2); border-radius: 8px; font-size: 13px; line-height: 1.6; }
  .rem-title { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }

  /* Sev info */
  .sev-info { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 20px; font-size: 12px; line-height: 1.65; color: var(--text-muted); }
  .sev-info strong { font-family: var(--font-mono); font-size: 11px; font-weight: 600; margin-right: 6px; }
  .sev-row { margin-bottom: 6px; } .sev-row:last-child { margin-bottom: 0; }
  .tag-low { color: var(--green); } .tag-medium { color: var(--yellow); } .tag-high { color: var(--orange); } .tag-critical { color: var(--red); }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-dim); font-family: var(--font-mono); font-size: 13px; border: 1px dashed var(--border); border-radius: 12px; }
  .empty-state .arrow { font-size: 24px; display: block; margin-bottom: 12px; opacity: 0.4; }
</style>
</head>

</div>

const tierLabels = { new:'New', core:'Core', 'elite-low':'Elite Low', 'elite-medium':'Elite Medium', 'elite-high':'Elite High', royalty:'Royalty' };
const reasonLabels = { 'delay-no-loss':'Order Delay / No Loss', 'delay-loss':'Order Delay / Loss of Items', 'supplier-error':'Supplier Purchase Errors', 'security':'Security Concerns', 'technical':'Technical Issues', 'communication':'Communication / Bad Experience', 'goodwill':'Goodwill' };

function getEntry() {
  const { reason, tier, sev, order } = state;
  if (!reason || !tier || !sev) return null;
  const sevData = data[reason]?.[tier]?.[sev];
  if (!sevData) return null;
  if ('under' in sevData || 'over' in sevData) return sevData[order] || sevData['under'];
  return sevData;
}

function rawSevData() {
  const { reason, tier, sev } = state;
  return data[reason]?.[tier]?.[sev];
}

function isPercent(entry) { return entry?.creditType?.startsWith('percent'); }

function calcCredits(entry, val) {
  if (!entry?.credits || entry.creditType === 'fixed') return null;
  if (!val || isNaN(val) || val <= 0) return null;
  const base = Math.round((entry.credits / 100) * val);
  const bonus = entry.bonus ? Math.round((entry.bonus / 100) * val) : 0;
  return { base, bonus, total: base + bonus };
}

function fmt(n) { return Number(n).toLocaleString('en-US'); }

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.dataset.original;
    btn.classList.add('copied'); btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 2000);
  });
}

function render() {
  const { reason, tier, sev, orderValue } = state;

  // Sev descriptions
  const sevDesc = document.getElementById('sev-descriptions');
  if (reason && severityDescriptions[reason]) {
    const d = severityDescriptions[reason];
    sevDesc.style.display = 'block';
    sevDesc.innerHTML = ['low','medium','high','critical'].map(s =>
      `<div class="sev-row"><strong class="tag-${s}">${s.toUpperCase()}</strong> ${d[s]}</div>`
    ).join('');
  } else { sevDesc.style.display = 'none'; }

  const entry = getEntry();
  const raw = rawSevData();
  const hasThreshold = raw && ('under' in raw || 'over' in raw);

  // Show order section?
  const orderSec = document.getElementById('order-section');
  const thresholdCol = document.getElementById('order-threshold-col');
  const valueCol = document.getElementById('order-value-col');

  const needsPercentCalc = entry && isPercent(entry);
  const showOrderSec = hasThreshold || needsPercentCalc;
  orderSec.className = showOrderSec ? 'order-section show' : 'order-section';
  thresholdCol.style.display = hasThreshold ? 'flex' : 'none';
  // Show value input for percent-based that are 'under' threshold OR non-threshold percent tiers
  valueCol.style.display = (needsPercentCalc && (!hasThreshold || state.order === 'under')) ? 'flex' : 'none';

  // Result
  const container = document.getElementById('result-container');
  if (!reason || !tier || !sev) {
    container.innerHTML = `<div class="empty-state"><span class="arrow">↑</span>Select reason, tier &amp; severity to see the compensation guide</div>`;
    return;
  }
  if (!entry) {
    container.innerHTML = `<div class="empty-state"><span class="arrow">⚠</span>No data for this combination.</div>`;
    return;
  }

  const calc = calcCredits(entry, orderValue);

  // Action
  let actionHTML = '';
  if (entry.action && entry.action !== 'N/A') {
    actionHTML = `<div class="result-section">
      <h3>Required Action</h3>
      <p id="action-text">${entry.action}</p>
      <button class="copy-btn" data-original="⎘ Copy action" onclick="copyText(document.getElementById('action-text').innerText,this)">⎘ Copy action</button>
    </div>`;
  }

  // Credits
  let creditHTML = '';
  if (entry.credits && entry.creditType === 'fixed') {
    creditHTML = `<div class="result-section">
      <h3>Compensation</h3>
      <span class="credit-big">${fmt(entry.credits)}</span>
      <span class="credit-label">credits for experience</span>
      <br><button class="copy-btn" style="margin-top:10px;" data-original="⎘ Copy amount" onclick="copyText('${entry.credits}',this)">⎘ Copy amount</button>
    </div>`;
  } else if (entry.credits && isPercent(entry)) {
    if (calc) {
      creditHTML = `<div class="result-section">
        <h3>Compensation</h3>
        <span class="credit-big calculated">${fmt(calc.total)} credits</span>
        <span class="credit-label">${entry.credits}% ${entry.creditType === 'percent-purchase' ? 'of affected purchase' : 'of affected order'} = ${fmt(calc.base)}</span>
        ${entry.bonus ? `<span class="credit-bonus">+ ${entry.bonus}% bonus (${entry.bonusLabel||''}) = ${fmt(calc.bonus)}</span>` : ''}
        <br><button class="copy-btn" style="margin-top:10px;" data-original="⎘ Copy total" onclick="copyText('${calc.total}',this)">⎘ Copy total</button>
      </div>`;
    } else {
      creditHTML = `<div class="result-section">
        <h3>Compensation</h3>
        <span class="credit-big">${entry.credits}%</span>
        <span class="credit-label">${entry.creditType === 'percent-purchase' ? 'of affected purchase' : 'of affected order'}</span>
        ${entry.bonus ? `<span class="credit-bonus">+ ${entry.bonus}% ${entry.bonusLabel||''}</span>` : ''}
        <span class="credit-hint">↑ Enter order amount above to calculate exact credits</span>
      </div>`;
    }
  } else if (!entry.credits && !entry.escalate && entry.action !== 'N/A') {
    creditHTML = `<div class="result-section"><h3>Compensation</h3><span style="font-size:13px;color:var(--text-muted);">No credits — action only</span></div>`;
  }

  const naHTML = entry.action === 'N/A' ? `<div style="padding:0 24px 24px;color:var(--text-muted);font-size:13px;">N/A for this combination.</div>` : '';

  let escalationHTML = '';
  if (entry.escalate && entry.escalateMsg) {
    escalationHTML = `<div class="escalation-box">
      <div class="esc-title">🚨 Escalation Required</div>
      <span id="esc-text">${entry.escalateMsg}</span><br>
      <button class="esc-copy-btn" data-original="⎘ Copy escalation note" onclick="copyText(document.getElementById('esc-text').innerText,this)">⎘ Copy escalation note</button>
    </div>`;
  }

  let reminderHTML = '';
  if (entry.reminder) {
    reminderHTML = `<div class="reminder-box"><div class="rem-title">📌 TL Reminder</div>${entry.reminder}</div>`;
  }

  const hasBody = (actionHTML || creditHTML) && entry.action !== 'N/A';

  container.innerHTML = `<div class="result-card">
    <div class="result-header">
      <span class="badge badge-${sev}">${sev.toUpperCase()}</span>
      <span class="result-title">${reasonLabels[reason]} — ${tierLabels[tier]}</span>
    </div>
    ${hasBody ? `<div class="result-body">${actionHTML}${creditHTML}</div>` : ''}
    ${naHTML}${escalationHTML}${reminderHTML}
  </div>`;
}

document.getElementById('reason-grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-reason]'); if (!btn) return;
  state.reason = btn.dataset.reason; state.sev = null;
  document.querySelectorAll('[data-reason]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('[data-sev]').forEach(b => b.classList.remove('active'));
  render();
});
document.getElementById('tier-grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-tier]'); if (!btn) return;
  state.tier = btn.dataset.tier;
  document.querySelectorAll('[data-tier]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  render();
});

  document.querySelectorAll('[data-sev]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  render();
});
document.getElementById('order-grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-order]'); if (!btn) return;
  state.order = btn.dataset.order;
  document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  render();
});
document.getElementById('order-value-input').addEventListener('input', e => {
  state.orderValue = parseFloat(e.target.value) || null;
  render();
});
</script>
</body>
</html>
